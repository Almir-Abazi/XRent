services:
  mysql:
    image: mysql:8.0
    container_name: xrent-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: xrent
      MYSQL_USER: xrent
      MYSQL_PASSWORD: xrent123
      MYSQL_ROOT_PASSWORD: root_xrent123
    ports:
      - "3306:3306"
    volumes:
      - xrent_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "xrent", "--password=xrent123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  xrent_mysql_data:
